name: parkscan
description: ParkScan — Smart Parking Receipt Scanner with AI Classification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Architecture & DI ────────────────────────
  get_it: ^7.6.4
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.3.3

  # ── State Management ─────────────────────────
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # ── Navigation ───────────────────────────────
  auto_route: ^8.0.0

  # ── Networking ───────────────────────────────
  dio: ^5.4.0

  # ── Serialization ────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # ── Local DB (SQLite) ────────────────────────
  sqflite: ^2.3.0
  path: ^1.8.3

  # ── Cache / Settings ─────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # ── ML Kit ───────────────────────────────────
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7

  # ── Env ──────────────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── UI ───────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  auto_route_generator: ^8.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.example
